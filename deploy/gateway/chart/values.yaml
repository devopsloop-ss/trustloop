# Helm values for the local TrustLoop dev deployment of the gateway
# scaffold (issue #3). See hack/gateway/setup.sh, the single documented
# entrypoint that builds the image into the shared local minikube cluster
# and installs this chart with these values.
#
# Deliberately dev-only, same spirit as deploy/spire/values.yaml and
# deploy/openfga/values.yaml: this is Phase 1 MVP scope (prove SPIFFE/mTLS
# identity extraction works end-to-end), not a production deployment.

image:
  # Built locally by hack/gateway/setup.sh (cross-compiled, then
  # `minikube image build` against the Docker daemon inside the minikube
  # VM, which lands the image directly in the cluster's image store) --
  # never pushed to or pulled from any registry for local dev.
  repository: trustloop-gateway
  tag: dev
  # Never: forces the kubelet to use the image already present in the
  # cluster's local image store rather than trying (and failing, since this
  # image isn't published anywhere) to pull it. This is the standard
  # local-dev pattern for images with no registry (minikube now, k3d
  # before).
  pullPolicy: Never

# The identity the K8s workload attestor issues to the gateway is entirely
# a function of (namespace, service account) -- see
# hack/gateway/setup.sh's registration entry, whose selectors
# (k8s:ns:<Release.Namespace>, k8s:sa:<serviceAccount.name>) must match this
# service account exactly, the same relationship hack/spire/setup.sh's
# sample workload has with its own registration entry.
serviceAccount:
  name: gateway

# Port the gateway's mTLS listener binds to inside the container, and the
# port templates/service.yaml exposes it on.
listenPort: 8443

# issue #4: where the gateway reaches OpenFGA to make its real can_call
# Check calls, and which store to check against. storeName must be the
# SAME store cmd/openfga-verify creates/reuses (see hack/openfga/setup.sh)
# -- the gateway finds it, it never creates its own.
openfga:
  apiURL: http://openfga.openfga.svc.cluster.local:8080
  storeName: trustloop-dev

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi
