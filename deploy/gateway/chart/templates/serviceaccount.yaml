# This ServiceAccount is not just RBAC plumbing -- it's half of the SPIFFE
# identity SPIRE issues the gateway. The K8s workload attestor turns
# "which pod connected to my Workload API socket" into selectors
# (k8s:ns:<namespace>, k8s:sa:<this service account's name>), which
# hack/gateway/setup.sh's registration entry matches against to decide
# what SPIFFE ID to hand back -- see that script for the entry, and
# deploy/spire/values.yaml for how the attestor itself is configured.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
